<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gorilla Order — Custom Stickers</title>
<style>
:root{--ink:#171717;--cream:#fff6e4;--paper:#fffdf7;--green:#2f4f3a;--red:#b7352d;--border:#dfd0b8;--muted:#6f695e;--soft:#f4efe4;--success:#2f6b43}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 8% 0%,rgba(183,53,45,.14),transparent 30%),radial-gradient(circle at 90% 8%,rgba(47,79,58,.14),transparent 28%),var(--cream);color:var(--ink);font-family:Arial,Helvetica,sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}.wrap{max-width:1180px;margin:0 auto;padding:24px 18px 72px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;border-bottom:3px solid var(--ink);padding-bottom:18px;margin-bottom:28px}.brand{font-size:24px;font-weight:950;letter-spacing:-.04em}.brand span{color:var(--red)}.status-pill{border:1px solid var(--border);background:var(--paper);border-radius:999px;padding:9px 12px;font-weight:900;color:var(--muted);font-size:13px}.hero{display:grid;grid-template-columns:1.08fr .92fr;gap:28px;align-items:center;padding:28px 0 38px;border-bottom:3px solid var(--ink);margin-bottom:26px}.eyebrow{text-transform:uppercase;letter-spacing:.09em;color:var(--red);font-size:12px;font-weight:950;margin:0 0 10px}h1{font-size:clamp(44px,7vw,86px);line-height:.88;letter-spacing:-.075em;margin:0}.subhead{color:var(--muted);font-size:20px;line-height:1.45;max-width:720px}.card,.panel,.summary,.confirm-card{background:rgba(255,253,247,.96);border:1px solid var(--border);border-radius:28px;box-shadow:0 16px 45px rgba(23,23,23,.09)}.hero-card{padding:24px;transform:rotate(1deg)}.preview-stage{height:270px;background:linear-gradient(135deg,#fff,#f5ead5);border:1px solid var(--border);border-radius:22px;display:grid;place-items:center;position:relative;overflow:hidden}.preview-stage:before{content:"";position:absolute;inset:22px;border:1px dashed rgba(47,79,58,.25);border-radius:18px}.sticker-preview{width:170px;height:170px;background:var(--green);color:white;display:grid;place-items:center;font-size:54px;font-weight:950;z-index:1;box-shadow:0 14px 35px rgba(0,0,0,.20)}.sticker-preview.circle{border-radius:50%}.sticker-preview.square{border-radius:18px}.sticker-preview.rectangle{width:220px;height:135px;border-radius:18px}.sticker-preview.oval{width:220px;height:135px;border-radius:50%}.sticker-preview.die-cut{clip-path:polygon(50% 0%,65% 28%,96% 35%,74% 58%,79% 91%,50% 75%,21% 91%,26% 58%,4% 35%,35% 28%)}.sticker-preview.kiss-cut{border-radius:22px;outline:10px solid rgba(183,53,45,.35)}.mini-row{display:flex;justify-content:space-between;gap:14px;border-bottom:1px solid #eee2ce;padding:13px 0 0;font-weight:950}.steps{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:28px 0}.step{border:1px solid var(--border);background:var(--paper);color:var(--muted);border-radius:999px;padding:10px 12px;font-size:13px;font-weight:950}.step.active{background:var(--green);color:white;border-color:var(--green)}.step.done{color:var(--green);border-color:rgba(47,79,58,.35)}.layout{display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:24px;align-items:start}.panel{padding:24px;margin-bottom:18px}.panel h2{margin:0 0 8px;font-size:34px;letter-spacing:-.05em}.panel-intro{color:var(--muted);margin:0 0 22px;line-height:1.45}.label{display:block;margin:20px 0 9px;font-size:13px;font-weight:950;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}.grid.four{grid-template-columns:repeat(4,1fr)}.grid.seven{grid-template-columns:repeat(7,1fr)}.option{border:2px solid var(--border);background:white;border-radius:18px;padding:14px 12px;min-height:86px;display:grid;gap:6px;align-content:center;text-align:left}.option strong{font-weight:950}.option span{font-size:12px;color:var(--muted)}.option.active{background:var(--green);border-color:var(--green);color:white}.option.active span{color:rgba(255,255,255,.8)}.qty{text-align:center;min-height:auto;font-weight:950}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.form-grid label{display:grid;gap:7px;font-size:14px;font-weight:950}.full{grid-column:1/-1}input,textarea,select{width:100%;border:1px solid var(--border);border-radius:14px;padding:13px;background:white}textarea{min-height:100px}.upload{position:relative;border:2px dashed var(--border);background:#fffaf0;border-radius:24px;padding:34px 20px;display:grid;gap:8px;text-align:center;cursor:pointer}.upload input{position:absolute;inset:0;opacity:0;cursor:pointer}.muted,.fine{color:var(--muted);font-size:14px}.file-list{margin:14px 0 0;padding-left:18px}.review-box{background:var(--soft);border-radius:20px;padding:18px;margin-top:18px}.review-box h3{margin:0 0 10px;font-size:22px;letter-spacing:-.03em}.summary{position:sticky;top:18px;padding:24px}.summary h2{margin:0;font-size:26px;letter-spacing:-.04em}.price{font-size:54px;font-weight:950;letter-spacing:-.06em;margin:12px 0 0}.values{display:grid;gap:8px;background:var(--soft);border-radius:18px;padding:14px;margin:18px 0;color:var(--green);font-weight:900}.rows{display:grid;gap:10px;margin:20px 0}.rows div{display:flex;justify-content:space-between;gap:16px;border-bottom:1px solid #eee2ce;padding-bottom:10px}.rows strong{font-weight:950}.rows span{color:var(--muted);text-align:right}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.primary,.secondary{border-radius:16px;padding:15px;font-weight:950;font-size:16px}.primary{border:none;background:var(--red);color:white}.secondary{border:2px solid var(--ink);background:white;color:var(--ink)}.primary:disabled,.secondary:disabled{opacity:.5;cursor:not-allowed}.alert{border:1px solid var(--border);background:#fffaf0;border-radius:16px;padding:14px;margin-top:14px}.error{border-color:rgba(183,53,45,.35);background:#fff1ed;color:#7d1b14}.confirm-wrap{max-width:900px;margin:0 auto;padding:24px 18px 72px}.confirm-card{padding:38px;text-align:center}.confirm-icon{width:62px;height:62px;border-radius:50%;background:var(--success);color:white;display:grid;place-items:center;font-size:32px;font-weight:950;margin:0 auto 18px}.confirm-card h1{font-size:clamp(44px,7vw,76px)}.confirm-details{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:26px 0;text-align:left}.confirm-detail{background:var(--soft);border-radius:18px;padding:16px}.confirm-detail strong{display:block;margin-bottom:4px}.confirm-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:22px}.confirm-actions a,.confirm-actions button{display:inline-flex;align-items:center;justify-content:center;min-width:160px}@media(max-width:900px){.hero,.layout{grid-template-columns:1fr}.summary{position:static}.hero-card{transform:none}.steps{grid-template-columns:repeat(2,1fr)}.grid,.grid.four{grid-template-columns:repeat(2,1fr)}.grid.seven{grid-template-columns:repeat(3,1fr)}.form-grid,.confirm-details{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const pricing={shapes:[{id:"circle",label:"Circle",sub:"Classic round",multiplier:1},{id:"square",label:"Square",sub:"Clean edges",multiplier:1},{id:"rectangle",label:"Rectangle",sub:"Great for labels",multiplier:1},{id:"die-cut",label:"Die Cut",sub:"Cut to shape",multiplier:1.18},{id:"kiss-cut",label:"Kiss Cut",sub:"Easy peel backing",multiplier:1.12},{id:"oval",label:"Oval",sub:"Soft shape",multiplier:1.05}],sizes:[{id:"2x2",label:'2" × 2"',sub:"Small logo",base:{50:24,100:34,250:58,500:95,1000:168,2500:365,5000:650}},{id:"3x3",label:'3" × 3"',sub:"Most popular",base:{50:29,100:41,250:72,500:116,1000:198,2500:445,5000:795}},{id:"4x4",label:'4" × 4"',sub:"Bold handout",base:{50:36,100:54,250:92,500:148,1000:255,2500:585,5000:1040}},{id:"5x5",label:'5" × 5"',sub:"Large sticker",base:{50:48,100:69,250:118,500:190,1000:325,2500:760,5000:1375}}],materials:[{id:"white-vinyl",label:"White Vinyl",sub:"Everyday choice",multiplier:1},{id:"clear-vinyl",label:"Clear Vinyl",sub:"+15%",multiplier:1.15},{id:"holographic",label:"Holographic",sub:"+35%",multiplier:1.35},{id:"chrome",label:"Chrome",sub:"+30%",multiplier:1.3}],finishes:[{id:"gloss",label:"Gloss",sub:"Shiny finish",multiplier:1},{id:"matte",label:"Matte",sub:"Soft finish",multiplier:1.05},{id:"uv",label:"UV Laminate",sub:"Extra durable",multiplier:1.12}],quantities:[50,100,250,500,1000,2500,5000],shipping:[{id:"pickup",label:"Pickup",sub:"Free",type:"flat",price:0},{id:"local-delivery",label:"Local Delivery",sub:"$15",type:"flat",price:15},{id:"standard-shipping",label:"Standard",sub:"Calculated",type:"tiered",tiers:[{max:75,price:8},{max:200,price:12},{max:500,price:18},{max:null,price:25}]},{id:"rush-shipping",label:"Rush",sub:"Calculated",type:"tiered",tiers:[{max:75,price:18},{max:200,price:25},{max:500,price:35},{max:null,price:50}]}]};
const state={step:1,shape:"die-cut",size:"3x3",material:"white-vinyl",finish:"matte",quantity:500,shipping:"standard-shipping",customer:{name:"",email:"",phone:"",company:"",neededBy:"",notes:""},files:[],loading:false,error:"",quote:null};
const app=document.getElementById("app"),money=n=>"$"+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}),find=(l,id)=>l.find(x=>x.id===id);
function calc(){const shape=find(pricing.shapes,state.shape),size=find(pricing.sizes,state.size),material=find(pricing.materials,state.material),finish=find(pricing.finishes,state.finish),shipping=find(pricing.shipping,state.shipping);const base=Number(size.base[state.quantity]||0);const subtotal=Math.round(base*shape.multiplier*material.multiplier*finish.multiplier);let shippingTotal=0;if(shipping.type==="flat")shippingTotal=Number(shipping.price||0);else{const tier=shipping.tiers.find(t=>t.max===null||subtotal<=t.max);shippingTotal=tier?tier.price:0}return{shape,size,material,finish,shipping,subtotal,shippingTotal,grandTotal:subtotal+shippingTotal,unitPrice:(subtotal+shippingTotal)/state.quantity}}
function optionGrid(options,key,extra=""){return `<div class="grid ${extra}">${options.map(o=>`<button type="button" class="option ${state[key]===o.id?"active":""}" data-key="${key}" data-value="${o.id}"><strong>${o.label}</strong><span>${o.sub||""}</span></button>`).join("")}</div>`}
function quantityGrid(){return `<div class="grid seven">${pricing.quantities.map(q=>`<button type="button" class="option qty ${state.quantity===q?"active":""}" data-key="quantity" data-value="${q}">${q.toLocaleString()}</button>`).join("")}</div>`}
function steps(){const labels=["Product","Customize","Artwork","Shipping","Review","Complete"];return `<div class="steps">${labels.map((l,i)=>`<button type="button" class="step ${state.step===i+1?"active":""} ${state.step>i+1?"done":""}" data-step="${i+1}">${i+1}. ${l}</button>`).join("")}</div>`}
function summaryTitle(){const c=calc();return `${state.quantity.toLocaleString()} ${c.shape.label} Stickers`}function details(){const c=calc();return `${c.size.label} / ${c.material.label} / ${c.finish.label}`}
function panel(){if(state.step===1)return `<section class="panel card"><h2>Choose shape and size</h2><p class="panel-intro">Start with the basic sticker format. Pricing updates instantly.</p><span class="label">Shape</span>${optionGrid(pricing.shapes,"shape")}<span class="label">Size</span>${optionGrid(pricing.sizes,"size","four")}</section>`;if(state.step===2)return `<section class="panel card"><h2>Customize finish</h2><p class="panel-intro">Choose material, finish, and quantity.</p><span class="label">Material</span>${optionGrid(pricing.materials,"material")}<span class="label">Finish</span>${optionGrid(pricing.finishes,"finish")}<span class="label">Quantity</span>${quantityGrid()}</section>`;if(state.step===3)return `<section class="panel card"><h2>Upload artwork</h2><p class="panel-intro">Upload your logo or sticker artwork. We'll review it before production.</p><label class="upload"><input id="artworkInput" type="file" multiple accept=".ai,.eps,.pdf,.svg,.psd,.png,.jpg,.jpeg"/><strong>Drop artwork here or browse files</strong><span class="muted">AI, EPS, PDF, SVG, PSD, PNG, JPG</span></label>${state.files.length?`<ul class="file-list">${state.files.map(f=>`<li>${f.name} — ${Math.round(f.size/1024)} KB</li>`).join("")}</ul>`:""}</section>`;if(state.step===4)return `<section class="panel card"><h2>Pickup or shipping</h2><p class="panel-intro">Choose how you want to receive the order.</p>${optionGrid(pricing.shipping,"shipping")}<div class="form-grid" style="margin-top:18px"><label>Needed by<input id="neededBy" type="date" value="${state.customer.neededBy}"></label></div></section>`;return `<section class="panel card"><h2>Review and contact info</h2><p class="panel-intro">Check the order details, then submit it to create a Printavo quote.</p><div class="form-grid"><label>Name<input id="name" value="${state.customer.name}" placeholder="Customer name"></label><label>Email<input id="email" type="email" value="${state.customer.email}" placeholder="email@example.com"></label><label>Phone<input id="phone" value="${state.customer.phone}" placeholder="Phone number"></label><label>Company<input id="company" value="${state.customer.company}" placeholder="Optional"></label><label class="full">Notes<textarea id="notes" placeholder="Deadline, artwork instructions, pickup/shipping notes, etc.">${state.customer.notes}</textarea></label></div><div class="review-box"><h3>Order review</h3><p class="muted">${summaryTitle()} — ${details()}</p></div>${state.error?`<div class="alert error"><strong>Something went wrong</strong><br>${state.error}</div>`:""}</section>`}
function summary(){const c=calc();return `<aside class="summary card"><p class="eyebrow">Your Order</p><h2>${summaryTitle()}</h2><div class="price">${money(c.grandTotal)}</div><p class="muted">${money(c.unitPrice)} each including shipping</p><div class="values"><span>✓ Printed locally in Salem</span><span>✓ Quote created in Printavo</span><span>✓ Artwork reviewed before production</span></div><div class="rows"><div><strong>Subtotal</strong><span>${money(c.subtotal)}</span></div><div><strong>Shipping</strong><span>${money(c.shippingTotal)}</span></div><div><strong>Size</strong><span>${c.size.label}</span></div><div><strong>Material</strong><span>${c.material.label}</span></div><div><strong>Finish</strong><span>${c.finish.label}</span></div><div><strong>Delivery</strong><span>${c.shipping.label}</span></div><div><strong>Artwork</strong><span>${state.files.length||"None yet"}</span></div></div></aside>`}
function layout(){const c=calc();return `<div class="wrap"><header class="topbar"><div class="brand">GORILLA<span>ORDER</span></div><div class="status-pill">Custom Stickers</div></header><section class="hero"><div><p class="eyebrow">Gorilla Salem Online Ordering</p><h1>Build your custom stickers.</h1><p class="subhead">Choose specs, upload artwork, review your total, and create a Printavo quote automatically.</p></div><div class="card hero-card"><p class="eyebrow">Live Preview</p><div class="preview-stage"><div class="sticker-preview ${state.shape}">GS</div></div><div class="mini-row"><span>${summaryTitle()}</span><span>${money(c.grandTotal)}</span></div></div></section>${steps()}<section class="layout"><main>${panel()}<div class="actions"><button class="secondary" id="backBtn" ${state.step===1?"disabled":""}>Back</button>${state.step<5?`<button class="primary" id="nextBtn">Continue</button>`:`<button class="primary" id="placeBtn" ${state.loading?"disabled":""}>${state.loading?"Creating Quote...":"Place Order"}</button>`}</div></main>${summary()}</section></div>`}
function confirmation(){const q=state.quote;return `<div class="confirm-wrap"><header class="topbar"><div class="brand">GORILLA<span>ORDER</span></div><div class="status-pill">Quote Created</div></header><section class="confirm-card"><div class="confirm-icon">✓</div><p class="eyebrow">You're all set</p><h1>Your quote was created.</h1><p class="subhead" style="margin-inline:auto">We'll review your artwork and order details shortly.</p><div class="confirm-details"><div class="confirm-detail"><strong>Quote ID</strong><span>${q.id}</span></div><div class="confirm-detail"><strong>Total</strong><span>${money(q.total)}</span></div><div class="confirm-detail"><strong>Order</strong><span>${summaryTitle()}</span></div></div><div class="confirm-actions"><a class="primary" href="${q.publicUrl}" target="_blank">View Quote</a><a class="secondary" href="${q.publicPdf}" target="_blank">Download PDF</a><button class="secondary" id="againBtn">Place Another Order</button></div></section></div>`}
function bind(){document.querySelectorAll("[data-key]").forEach(btn=>btn.onclick=()=>{const k=btn.dataset.key;let v=btn.dataset.value;if(k==="quantity")v=Number(v);state[k]=v;render()});document.querySelectorAll("[data-step]").forEach(btn=>btn.onclick=()=>{state.step=Number(btn.dataset.step);render()});const back=document.getElementById("backBtn");if(back)back.onclick=()=>{state.step=Math.max(1,state.step-1);render()};const next=document.getElementById("nextBtn");if(next)next.onclick=()=>{state.step=Math.min(5,state.step+1);render()};const place=document.getElementById("placeBtn");if(place)place.onclick=placeOrder;const again=document.getElementById("againBtn");if(again)again.onclick=()=>location.reload();const art=document.getElementById("artworkInput");if(art)art.onchange=e=>{state.files=Array.from(e.target.files||[]);render()};const needed=document.getElementById("neededBy");if(needed)needed.oninput=e=>{state.customer.neededBy=e.target.value};["name","email","phone","company","notes"].forEach(id=>{const el=document.getElementById(id);if(el)el.oninput=e=>{state.customer[id]=e.target.value}})}
async function placeOrder(){const c=calc();state.loading=true;state.error="";render();const payload={source:"Gorilla Order Polished Checkout",customer:state.customer,order:{product:"Custom Stickers",quantity:state.quantity,shape:c.shape.label,size:c.size.label,material:c.material.label,finish:c.finish.label,neededBy:state.customer.neededBy,notes:state.customer.notes},pricing:{subtotal:c.subtotal,shippingMethod:c.shipping.label,shippingTotal:c.shippingTotal,grandTotal:c.grandTotal},artworkFiles:state.files.map(f=>({name:f.name,sizeKb:Math.round(f.size/1024),type:f.type||"unknown"}))};try{const res=await fetch("/api/create-printavo-order",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});const result=await res.json();if(!res.ok||!result.success){state.loading=false;state.error=result.message||"The quote could not be created.";render();return}state.loading=false;state.quote=result.quote;state.step=6;render()}catch(err){state.loading=false;state.error=String(err);render()}}
function render(){app.innerHTML=state.step===6&&state.quote?confirmation():layout();bind()}render();
</script>
</body>
</html>
